name: Test Action

on:
  pull_request:
  workflow_dispatch:

jobs:
  test-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test - should fail without region
        id: no-region
        continue-on-error: true
        uses: ./
        with:
          parameter_name: "/test/param"
          pgp_passphrase: "test-passphrase"

      - name: Verify validation failed for missing region
        run: |
          if [[ "${{ steps.no-region.outcome }}" == "success" ]]; then
            echo "::error::Should have failed without region"
            exit 1
          fi
          echo "Validation correctly failed without region"

      - name: Test - should fail without parameter_name
        id: no-param
        continue-on-error: true
        uses: ./
        with:
          region: us-east-1
          pgp_passphrase: "test-passphrase"

      - name: Verify validation failed for missing parameter_name
        run: |
          if [[ "${{ steps.no-param.outcome }}" == "success" ]]; then
            echo "::error::Should have failed without parameter_name"
            exit 1
          fi
          echo "Validation correctly failed without parameter_name"

      - name: Test - should fail with only access_key_id
        id: only-access-key
        continue-on-error: true
        uses: ./
        with:
          access_key_id: "test-key"
          region: us-east-1
          parameter_name: "/test/param"
          pgp_passphrase: "test-passphrase"

      - name: Verify validation failed for partial credentials (access_key only)
        run: |
          if [[ "${{ steps.only-access-key.outcome }}" == "success" ]]; then
            echo "::error::Should have failed with only access_key_id"
            exit 1
          fi
          echo "Validation correctly failed with only access_key_id"

      - name: Test - should fail with only secret_access_key
        id: only-secret-key
        continue-on-error: true
        uses: ./
        with:
          secret_access_key: "test-secret"
          region: us-east-1
          parameter_name: "/test/param"
          pgp_passphrase: "test-passphrase"

      - name: Verify validation failed for partial credentials (secret_key only)
        run: |
          if [[ "${{ steps.only-secret-key.outcome }}" == "success" ]]; then
            echo "::error::Should have failed with only secret_access_key"
            exit 1
          fi
          echo "Validation correctly failed with only secret_access_key"

      - name: Test - should fail with invalid scope
        id: invalid-scope
        continue-on-error: true
        uses: ./
        with:
          region: us-east-1
          parameter_name: "/test/param"
          pgp_passphrase: "test-passphrase"
          scope: invalid-option

      - name: Verify validation failed for invalid scope
        run: |
          if [[ "${{ steps.invalid-scope.outcome }}" == "success" ]]; then
            echo "::error::Should have failed with invalid scope"
            exit 1
          fi
          echo "Validation correctly failed with invalid scope"

  test-decrypt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create test encrypted payload
        id: create-payload
        run: |
          # Create a test environment payload and encrypt it
          TEST_ENV="TEST_VAR=hello_world
          ANOTHER_VAR=foo_bar"
          ENC=$(gpg --symmetric --batch --passphrase "test-passphrase" --output - <(echo "$TEST_ENV") | base64 -w0)
          echo "encrypted=$ENC" >> $GITHUB_OUTPUT

      - name: Test decrypt functionality
        uses: ./
        with:
          pgp_passphrase: "test-passphrase"
          decrypt: ${{ steps.create-payload.outputs.encrypted }}

      - name: Verify decrypted environment variables
        run: |
          if [[ "$TEST_VAR" != "hello_world" ]]; then
            echo "::error::TEST_VAR not set correctly, got: $TEST_VAR"
            exit 1
          fi
          if [[ "$ANOTHER_VAR" != "foo_bar" ]]; then
            echo "::error::ANOTHER_VAR not set correctly, got: $ANOTHER_VAR"
            exit 1
          fi
          echo "Decrypt test passed!"

  # Tests that the matrix output is populated for both SSM and Secrets scopes.
  # Uses a mock AWS CLI so no real credentials are needed.
  # Run locally with: act pull_request -j test-matrix-output
  test-matrix-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mock AWS CLI
        run: |
          mkdir -p /tmp/mock-aws-bin
          cat > /tmp/mock-aws-bin/aws << 'EOF'
          #!/bin/bash
          # Returns a fixed JSON object, ignoring all args
          echo '{"TEST_VAR":"hello_world","ANOTHER_VAR":"foo_bar"}'
          EOF
          chmod +x /tmp/mock-aws-bin/aws
          echo "/tmp/mock-aws-bin" >> $GITHUB_PATH

      - name: Verify action.yml declares matrix output
        run: |
          if ! grep -A10 "^outputs:" action.yml | grep -q "matrix:"; then
            echo "::error::action.yml does not declare matrix in outputs: section"
            exit 1
          fi
          echo "action.yml declares matrix output"

      - name: Fetch with SSM scope
        id: fetch-ssm
        uses: ./
        with:
          region: us-east-1
          parameter_name: "/test/param"
          pgp_passphrase: "test-passphrase"

      - name: Verify SSM matrix output
        run: |
          MATRIX='${{ steps.fetch-ssm.outputs.matrix }}'
          if [[ -z "$MATRIX" ]]; then
            echo "::error::matrix output was empty for SSM scope"
            exit 1
          fi
          TEST_VAR=$(echo "$MATRIX" | jq -r '.TEST_VAR')
          if [[ "$TEST_VAR" != "hello_world" ]]; then
            echo "::error::TEST_VAR not correct, got: $TEST_VAR"
            exit 1
          fi
          ANOTHER_VAR=$(echo "$MATRIX" | jq -r '.ANOTHER_VAR')
          if [[ "$ANOTHER_VAR" != "foo_bar" ]]; then
            echo "::error::ANOTHER_VAR not correct, got: $ANOTHER_VAR"
            exit 1
          fi
          echo "SSM matrix output: $MATRIX"

      - name: Fetch with Secrets scope
        id: fetch-secrets
        uses: ./
        with:
          region: us-east-1
          parameter_name: "my-secret"
          pgp_passphrase: "test-passphrase"
          scope: Secrets

      - name: Verify Secrets matrix output
        run: |
          MATRIX='${{ steps.fetch-secrets.outputs.matrix }}'
          if [[ -z "$MATRIX" ]]; then
            echo "::error::matrix output was empty for Secrets scope"
            exit 1
          fi
          TEST_VAR=$(echo "$MATRIX" | jq -r '.TEST_VAR')
          if [[ "$TEST_VAR" != "hello_world" ]]; then
            echo "::error::TEST_VAR not correct, got: $TEST_VAR"
            exit 1
          fi
          echo "Secrets matrix output: $MATRIX"

  # Integration test - requires AWS credentials
  # Run with: act -j test-ssm-fetch -s AWS_ACCESS_KEY_ID=xxx -s AWS_SECRET_ACCESS_KEY=xxx -s AWS_REGION=xxx -s SSM_PARAMETER_NAME=xxx
  # This job only runs on workflow_dispatch (manual trigger)
  test-ssm-fetch:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Fetch from SSM with credentials
        id: fetch
        uses: ./
        with:
          access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          parameter_name: ${{ secrets.SSM_PARAMETER_NAME }}
          pgp_passphrase: "test-passphrase"

      - name: Fetch from Secrets with credentials
        id: fetch-secrets
        uses: ./
        with:
          access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          parameter_name: ${{ secrets.SSM_PARAMETER_NAME }}
          pgp_passphrase: "test-passphrase"
          scope: Secrets

      - name: Verify encrypted output exists
        run: |
          if [[ -z "${{ steps.fetch.outputs.encrypted_environment }}" ]]; then
            echo "::error::No encrypted output produced"
            exit 1
          fi
          echo "SSM fetch test passed!"

      - name: Decrypt and verify
        uses: ./
        with:
          pgp_passphrase: "test-passphrase"
          decrypt: ${{ steps.fetch.outputs.encrypted_environment }}

      - name: Show that env vars are set (masked)
        run: |
          echo "Environment variables have been set and masked"
          env | grep -c "=" || true